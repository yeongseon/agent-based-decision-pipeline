name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: python -m pip install -e .[dev]

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff check
        run: ruff check .

      - name: Mypy strict
        run: mypy --strict --config-file mypy.ini src/abdp tests

      - name: Pytest with coverage
        run: pytest

      - name: Mutmut
        run: mutmut run

      - name: Mutmut results
        if: always()
        run: |
          mutmut results
          for m in $(mutmut results 2>/dev/null | awk '/survived/ {print $1}' | tr -d ':'); do
            echo "=== survivor: $m ==="
            mutmut show "$m" || true
          done

      - name: Build package
        run: python -m build
